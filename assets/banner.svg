<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img" aria-label="datev-bridge — Stripe CSV to DATEV EXTF Buchungsstapel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0E14"/>
      <stop offset="1" stop-color="#0E1320"/>
    </linearGradient>
    <radialGradient id="glowI" cx="0.16" cy="0.18" r="0.5">
      <stop offset="0" stop-color="#635BFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#635BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowG" cx="0.9" cy="0.95" r="0.55">
      <stop offset="0" stop-color="#3FB950" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#3FB950" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C83FF"/>
      <stop offset="1" stop-color="#3FB950"/>
    </linearGradient>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#glowI)"/>
  <rect width="1280" height="420" fill="url(#glowG)"/>
  <rect x="0.5" y="0.5" width="1279" height="419" fill="none" stroke="#232A36" stroke-width="1"/>

  <!-- left: wordmark + tagline -->
  <text x="72" y="92" class="mono" font-size="15" letter-spacing="5" fill="#7C83FF">OPEN-SOURCE&#160;&#160;CLI</text>

  <text x="70" y="178" class="sans" font-size="78" font-weight="800" fill="#E6EDF3" letter-spacing="-2">datev-bridge</text>

  <text x="72" y="232" class="sans" font-size="27" fill="#ADBAC7">
    <tspan fill="#7C83FF" font-weight="700">Stripe CSV</tspan>
    <tspan fill="#6E7681">&#160;&#160;→&#160;&#160;</tspan>
    <tspan fill="#3FB950" font-weight="700">DATEV EXTF</tspan>
    <tspan fill="#ADBAC7">&#160; Buchungsstapel</tspan>
  </text>

  <!-- pills -->
  <g class="mono" font-size="15">
    <g>
      <rect x="72" y="266" width="92" height="34" rx="17" fill="#11151F" stroke="#2C3340"/>
      <text x="118" y="288" text-anchor="middle" fill="#C9D1D9">MIT</text>
    </g>
    <g>
      <rect x="176" y="266" width="132" height="34" rx="17" fill="#11151F" stroke="#2C3340"/>
      <text x="242" y="288" text-anchor="middle" fill="#C9D1D9">TypeScript</text>
    </g>
    <g>
      <rect x="320" y="266" width="116" height="34" rx="17" fill="#11151F" stroke="#2C3340"/>
      <text x="378" y="288" text-anchor="middle" fill="#C9D1D9">npx-ready</text>
    </g>
    <g>
      <rect x="448" y="266" width="150" height="34" rx="17" fill="#11151F" stroke="#2C3340"/>
      <text x="523" y="288" text-anchor="middle" fill="#C9D1D9">SKR03 / SKR04</text>
    </g>
  </g>

  <text x="72" y="352" class="sans" font-size="15" fill="#6E7681">Format-kompatibel · nicht DATEV-zertifiziert · keine GoBD-Garantie</text>

  <!-- right: CSV -> EXTF document motif -->
  <g transform="translate(842,112)">
    <!-- source CSV doc -->
    <g transform="translate(0,40)">
      <rect x="0" y="0" width="150" height="190" rx="14" fill="#11151F" stroke="#3A3F66"/>
      <rect x="0" y="0" width="150" height="46" rx="14" fill="#1A1B33"/>
      <rect x="0" y="30" width="150" height="16" fill="#1A1B33"/>
      <text x="20" y="31" class="mono" font-size="15" fill="#7C83FF">CSV</text>
      <g stroke="#2C3340" stroke-width="6" stroke-linecap="round">
        <line x1="20" y1="76" x2="130" y2="76"/>
        <line x1="20" y1="100" x2="130" y2="100"/>
        <line x1="20" y1="124" x2="108" y2="124"/>
        <line x1="20" y1="148" x2="130" y2="148"/>
        <line x1="20" y1="172" x2="92" y2="172"/>
      </g>
    </g>

    <!-- arrow -->
    <g transform="translate(170,135)">
      <line x1="0" y1="0" x2="78" y2="0" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round"/>
      <path d="M76 -10 L96 0 L76 10 Z" fill="#3FB950"/>
    </g>

    <!-- target EXTF doc -->
    <g transform="translate(268,40)">
      <rect x="0" y="0" width="150" height="190" rx="14" fill="#11151F" stroke="#2E5B39"/>
      <rect x="0" y="0" width="150" height="46" rx="14" fill="#13251A"/>
      <rect x="0" y="30" width="150" height="16" fill="#13251A"/>
      <text x="20" y="31" class="mono" font-size="15" fill="#3FB950">EXTF</text>
      <g stroke="#264433" stroke-width="6" stroke-linecap="round">
        <line x1="20" y1="76" x2="130" y2="76"/>
        <line x1="20" y1="100" x2="130" y2="100"/>
        <line x1="20" y1="124" x2="118" y2="124"/>
        <line x1="20" y1="148" x2="130" y2="148"/>
        <line x1="20" y1="172" x2="100" y2="172"/>
      </g>
      <!-- green check badge -->
      <circle cx="150" cy="0" r="22" fill="#0B0E14" stroke="#3FB950" stroke-width="2"/>
      <path d="M140 0 l7 7 l13 -15" fill="none" stroke="#3FB950" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
